<!DOCTYPE html>
<html>
<head>
<title>MiserBot v100</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0b0b16;
color:white;
text-align:center;
padding-top:80px;
}

input,button{
padding:10px;
margin:8px;
border-radius:6px;
border:none;
}

button{
background:#7b3fe4;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<h1>👑 MiserBot v100</h1>
<p>AI Lead Capture System</p>

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="phone" placeholder="Phone"><br>

<button onclick="sendLead()">Submit</button>

<script>

async function sendLead(){

const API="https://web-production-a4856.up.railway.app/webhook"

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value
})
})

alert("Lead Sent 🚀")

}

</script>

</body>
</html>
