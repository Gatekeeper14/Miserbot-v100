<!DOCTYPE html>
<html>
<head>

<title>MiserBot v100</title>

<style>

body{
background:#050510;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#050510;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
z-index:9999;
}

.container{
margin-top:120px;
}

input{
width:260px;
padding:14px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:14px 30px;
background:#6e3bff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="loader">
🤖 MiserBot Loading...
</div>

<div class="container">

<h1>👑 MiserBot v100</h1>
<h3>AI Lead Capture System</h3>

<input id="name" placeholder="Name">

<br>

<input id="email" placeholder="Email">

<br>

<input id="phone" placeholder="Phone">

<br>

<button onclick="sendLead()">Submit</button>

</div>

<script>

window.addEventListener("load",function(){

setTimeout(function(){

document.getElementById("loader").style.display="none";

},2000);

});

async function sendLead(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;

await fetch("https://web-production-a4856.up.railway.app/webhook",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
phone:phone,
source:"website"
})

});

alert("Lead Sent 🚀");

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("phone").value="";

}

</script>

</body>
</html>
